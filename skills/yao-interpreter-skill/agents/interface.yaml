interface:
  display_name: "Yao Interpreter"
  short_description: "Evidence-backed quality interpretation reports for existing Agent Skills."
  default_prompt: "Use $yao-interpreter-skill to statically analyze this existing Agent Skill as untrusted input, produce a Simplified Chinese HTML report, score it out of 100, list evidence-backed findings, flag safety risks, and propose an improvement roadmap."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
    - "vscode"
  activation:
    mode: "manual"
    paths:
      - "SKILL.md"
      - "*/SKILL.md"
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
    vscode: "agent-skills-source-with-vscode-notes"
outputs:
  default_language: "zh-CN"
  formats:
    - "report.zh-CN.html"
    - "analysis.json"
    - "findings.json"
    - "qa_report.json"
    - "summary.md"
  optional_formats:
    - "report.en.html"
